version: 2.1

anchors:
  context: &context
    context: shared

  default_job_config: &default_job_config
    working_directory: /home/circleci/plugin
    machine:
      image: default

  test_job_config: &test_job_config
    <<: *context
    requires:
      - prepare

jobs:
  prepare:
    <<: *default_job_config
    steps:
      - checkout
      - run:
          name: Fetch tags
          command: git fetch --tags
      - run:
          name: Create .npmrc
          command: |
            echo "//npm.pkg.github.com/:_authToken=${GH_AUTH_TOKEN}" >> ~/.npmrc
            echo "@gravitykit:registry=https://npm.pkg.github.com" >> ~/.npmrc
      - run:
          name: Install dependencies
          command: |
            npx @gravitykit/gktools composer install
            npx @gravitykit/gktools npm install
      - run:
          name: Prepare unit test dependencies
          command: npx @gravitykit/phpunit prepare
      - run:
          name: Run tests
          command: |
            if git log -1 --pretty=%B | grep -iq "\[skip tests\]"; then
              echo "Skipping tests."
              exit 0
            fi
            npx @gravitykit/phpunit test --parallel
      - persist_to_workspace:
          root: /home/circleci
          paths:
            - .

  build_package_release:
    <<: *default_job_config
    steps:
      - attach_workspace:
          at: /home/circleci
      - run:
          name: Configure git
          command: |
            git config user.email "support@gravitykit.com"
            git config user.name "GravityKit - CI"
      - run:
          name: Replace @since tags
          command: npx @gravitykit/gktools replace-since --commit

      - run:
          name: Build and package
          command: npx @gravitykit/gktools build
      - run:
          name: Create GitHub release
          command: npx @gravitykit/gktools release
      - run:
          name: Announce build
          command: |
            if ! git log -1 --pretty=%B | grep -iq "\[skip notify\]"; then
              npx @gravitykit/gktools announce
            fi
      - run:
          name: Collect build artifacts
          command: |
            mkdir -p .release
            cp gravity-forms-zero-spam-*.zip .release/ 2>/dev/null || true
      - store_artifacts:
          path: .release
          destination: release

workflows:
  version: 2
  test_and_release:
    jobs:
      - prepare:
          <<: *context
      - build_package_release:
          <<: *context
          requires:
            - prepare
