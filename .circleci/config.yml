version: 2.1

anchors:
  context: &context
    context: shared

  default_job_config: &default_job_config
    working_directory: /home/circleci/plugin
    machine:
      image: default

jobs:
  lint:
    <<: *default_job_config
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Lint
          command: npm run lint

  build_package_release:
    <<: *default_job_config
    steps:
      - checkout
      - run:
          name: Getting GravityKit test/build tools
          command: |
            git clone git@github.com:GravityKit/Tooling.git /home/circleci/tooling
      - run:
          name: Build assets
          command: |
            npm ci
            npm run build
      - run:
          name: Packaging
          command: |
            if [ "${CIRCLE_BRANCH}" != "main" ]; then
              /home/circleci/tooling/build-tools/build_tools.sh package_build -o "gravity-forms-zero-spam gravityforms-zero-spam.php --include-hash"
            else
              /home/circleci/tooling/build-tools/build_tools.sh package_build -o "gravity-forms-zero-spam gravityforms-zero-spam.php $([[ $(git log -n 1 | grep "\[skip release\]") ]] && echo --include-hash)"
            fi
            mkdir -p gravity-forms-zero-spam
            cp -R dist gravity-forms-zero-spam
            zip -gr $(ls gravity-forms-zero-spam-*.zip) gravity-forms-zero-spam
            rm -rf gravity-forms-zero-spam
            mkdir .release
            cp gravity-forms-zero-spam-*.zip .release
      - run:
          name: Creating a GitHub release
          command: |
            if [ "${CIRCLE_BRANCH}" == "main" ]; then
              git config user.email "support@gravitykit.com"
              git config user.name "GravityKit - CI"
              /home/circleci/tooling/build-tools/build_tools.sh create_release -o "gravityforms-zero-spam.php $(ls gravity-forms-zero-spam-*.zip)"
            fi
      - run:
          name: Notifying GravityKit Release Manager
          command: |
            if ! [[ $(git log -n 1 | grep "\[skip notify\]") ]]; then
              /home/circleci/tooling/build-tools/build_tools.sh announce_build -o "gravityforms-zero-spam.php $(ls gravity-forms-zero-spam-*.zip) --with-circle"
            fi
      - store_artifacts:
          path: .release
          destination: release

workflows:
  version: 2
  test_and_package:
    jobs:
      - lint
      - build_package_release:
          <<: *context
          requires:
            - lint
