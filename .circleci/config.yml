version: 2.1

anchors:
  context: &context
    context: shared

  default_job_config: &default_job_config
    working_directory: /home/circleci/plugin
    machine:
      image: default

jobs:
  build_package_release:
    <<: *default_job_config
    steps:
      - checkout
      - run:
          name: Fetch tags
          command: git fetch --tags
      - run:
          name: Create .npmrc
          command: |
            echo "//npm.pkg.github.com/:_authToken=${GH_AUTH_TOKEN}" >> ~/.npmrc
            echo "@gravitykit:registry=https://npm.pkg.github.com" >> ~/.npmrc
      - run:
          name: Install dependencies
          command: |
            npx @gravitykit/gktools composer install
            npx @gravitykit/gktools npm install
      - run:
          name: Lint
          command: |
            npm run lint
            npx @gravitykit/gktools composer code:analyze
            npx @gravitykit/gktools composer code:sniff
      - run:
          name: Configure git
          command: |
            git config user.email "support@gravitykit.com"
            git config user.name "GravityKit - CI"
      - run:
          name: Replace @since tags
          command: npx @gravitykit/gktools replace-since --commit
      - run:
          name: Build and package
          command: npx @gravitykit/gktools build
      - run:
          name: Trigger translation pipeline
          command: |
            if [ "${CIRCLE_BRANCH}" == "develop" ] || [ "${CIRCLE_BRANCH}" == "main" ]; then
              npx @gravitykit/gktools translate gravity-forms-zero-spam --commit --push
            else
              echo "Skipping translation pipeline."
            fi
      - run:
          name: Create GitHub release
          command: npx @gravitykit/gktools release
      - run:
          name: Announce build
          command: |
            if ! git log -1 --pretty=%B | grep -iq "\[skip notify\]"; then
              npx @gravitykit/gktools announce
            fi
      - run:
          name: Collect build artifacts
          command: |
            mkdir -p .release
            cp gravity-forms-zero-spam-*.zip .release/ 2>/dev/null || true
      - store_artifacts:
          path: .release
          destination: release

workflows:
  version: 2
  lint_build_and_release:
    jobs:
      - build_package_release:
          <<: *context
